      :root {
        --accent: #64ffda;
        --bg-deep: #0a0f1c;
        --text-primary: #e2e8f0;
        --text-muted: #64748b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Syne", sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        overflow-x: hidden;
        line-height: 1.85;
      }

      .font-mono {
        font-family: "Space Mono", monospace;
      }

      ::selection {
        background: rgba(100, 255, 218, 0.2);
        color: var(--accent);
      }

      /* background */
      .hero-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 80% 50% at 20% 40%,
            rgba(100, 255, 218, 0.06) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 40% at 80% 20%,
            rgba(99, 102, 241, 0.08) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 50% 60% at 60% 80%,
            rgba(236, 72, 153, 0.05) 0%,
            transparent 60%
          );
      }

      .grid-overlay {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(100, 255, 218, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(100, 255, 218, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
      }

      .noise {
        position: fixed;
        inset: 0;
        z-index: 1;
        opacity: 0.35;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      }

      /* page enter */
      @keyframes pageEnter {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .content {
        position: relative;
        z-index: 2;
        animation: pageEnter 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      /* typed cursor */
      .typed-cursor {
        color: var(--accent);
        font-weight: 400;
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* responsive */
      @media (max-width: 640px) {
        .hero-heading {
          font-size: 2.8rem;
          line-height: 1.15;
          margin-bottom: 1.5rem;
        }
        .hero-greeting {
          font-size: 0.8rem;
          margin-bottom: 2rem;
        }
        .hero-typed {
          font-size: 1rem;
        }
        .hero-section {
          padding-left: 1.25rem;
          padding-right: 1.25rem;
        }
      }

      @media (min-width: 641px) and (max-width: 1024px) {
        .hero-heading {
          font-size: 5rem;
        }
      }

      /* scroll indicator */
      .scroll-hint {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        padding-bottom: 3rem;
        margin-top: -10rem;
        animation: scrollPulse 2.4s ease-in-out infinite;
      }

      .scroll-hint__line {
        display: block;
        width: 1px;
        height: 100px;
        background: linear-gradient(
          to bottom,
          rgba(100, 255, 218, 0.4),
          rgba(100, 255, 218, 0.85)
        );
      }

      .scroll-hint__arrow {
        width: 12px;
        height: 12px;
        border-right: 1px solid rgba(100, 255, 218, 0.85);
        border-bottom: 1px solid rgba(100, 255, 218, 0.85);
        transform: rotate(45deg);
        margin-top: -1px;
      }

      @keyframes scrollPulse {
        0% {
          opacity: 0;
          transform: translateY(-10px);
        }
        40% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateY(10px);
        }
      }

      /* link cards */
      .links-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 0 2rem 16rem;
      }
      .link-card {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        width: 100%;
        max-width: 420px;
        padding: 1rem 1.25rem;
        border: 1px solid rgba(100, 255, 218, 0.15);
        border-radius: 0.75rem;
        background: rgba(100, 255, 218, 0.04);
        color: var(--text-primary);
        text-decoration: none;
        font-family: "Syne", sans-serif;
        transition:
          border-color 0.25s ease,
          background 0.25s ease,
          transform 0.2s ease;
      }

      .link-card:hover {
        border-color: rgba(100, 255, 218, 0.5);
        background: rgba(100, 255, 218, 0.08);
        transform: translateY(-2px);
        color: var(--accent);
      }

      .link-card__icon {
        font-size: 1.1rem;
        width: 1.5rem;
        text-align: center;
        flex-shrink: 0;
        color: var(--accent);
      }

      .link-card__label {
        flex: 1;
        font-size: 0.95rem;
        letter-spacing: 0.04em;
        text-align: center;
      }

      .link-card__arrow {
        font-size: 0.75rem;
        flex-shrink: 0;
        opacity: 0.4;
        transition:
          opacity 0.25s ease,
          transform 0.25s ease;
      }

      .link-card:hover .link-card__arrow {
        opacity: 1;
        transform: translate(2px, -2px);
      }
    </style>
  </head>
